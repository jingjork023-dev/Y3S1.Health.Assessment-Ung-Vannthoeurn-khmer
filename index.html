            { c: "មេរៀនទី ៨: Shift Assessment", q: "៦. ជ្រើសយក ៣ ដែលត្រឹមត្រូវបំផុត។ ចំណុចដែលត្រូវពិនិត្យក្នុងពេលធ្វើ ការវាយតម្លៃចរន្តឈាម (circulation assessment):", t: 3, a: [0, 1, 2], o: ["ជីពចរ ពណ៌ស្បែក និងសំណើម (Pulse, skin color and moisture)", "សីតុណ្ហភាពចុងដៃចុងជើង (Peripheral temperature)", "ពេលវេលាបំពេញឈាមសរសៃប្តូរ (Capillary Refill Time)", "ការប្រឹងដកដង្ហើម (Work of breathing)"] },
            { c: "មេរៀនទី ៨: Shift Assessment", q: "៧. ជ្រើសយក ៣ ដែលត្រឹមត្រូវបំផុត។ ចំណុចដែលត្រូវពិនិត្យក្នុងពេលធ្វើ ការវាយតម្លៃពិការភាព (Disability assessment):", t: 3, a: [0, 1, 2], o: ["ឧបករណ៍ជំនួយចលនា និងតម្រូវការផ្លាស់ទី (Mobility aids and transfer needs)", "ឧបករណ៍ជំនួយការមើល និងស្តាប់ (Visual and hearing aids)", "ចលនា ឬការដើរមិនធម្មតា (Abnormal movement or gait)", "ពណ៌ស្បែក និងសំណើម (Skin color and moisture)"] },
            { c: "មេរៀនទី ៨: Shift Assessment", q: "៨. ជ្រើសយក ៣ ដែលត្រឹមត្រូវបំផុត។ ចំណុចដែលត្រូវពិនិត្យក្នុងពេលធ្វើ ការវាយតម្លៃការបញ្ចេញចោល (Output/elimination assessment):", t: 3, a: [0, 1, 2], o: ["ទម្រង់នៃការបន្ទោរបង់ (Bowel patterns)", "ទម្រង់នៃការនោម (Urinary patterns)", "ប្លោកនោម (Bladder)", "ការមើលឃើញ និងការស្តាប់ (Visual and hearing)"] },
            { c: "មេរៀនទី ៨: Shift Assessment", q: "៩. ជ្រើសយក ៣ ដែលត្រឹមត្រូវបំផុត។ ចំណុចដែលត្រូវពិនិត្យក្នុងពេលធ្វើ ការវាយតម្លៃការបញ្ចូល/អាហារូបត្ថម្ភ (Input/nutrition assessment):", t: 3, a: [0, 1, 2], o: ["ចំណង់អាហារ និងការទទួលយកអាហារ (Appetite and food tolerance)", "ចង្អោរ និងក្អួត (Nausea and vomiting)", "ជាតិទឹក និងស្ថានភាពសំណើម (Fluids and hydration)", "ទម្រង់នៃការនោម (Urinary patterns)"] },
            { c: "មេរៀនទី ៨: Shift Assessment", q: "១០. ជ្រើសយក ៣ ដែលត្រឹមត្រូវបំផុត។ ចំណុចដែលត្រូវពិនិត្យក្នុងពេលធ្វើ ការវាយតម្លៃផ្លូវដង្ហើម (airway assessment):", t: 3, a: [0, 1, 2], o: ["សម្លេងដង្ហើម (Breathing sounds (noise))", "ស្លេសផ្លូវដង្ហើម (Airway secretion)", "ការស្ទះផ្លូវដង្ហើម (Airway obstacles)", "ចង្អោរ និងក្អួត (Nausea and vomiting)"] },
            { c: "មេរៀនទី ៨: Shift Assessment", q: "១១. ជ្រើសយក ៣ ដែលត្រឹមត្រូវបំផុត។ ចំណុចដែលត្រូវពិនិត្យក្នុងពេលធ្វើ ការវាយតម្លៃតាមវេន (Shift assessment):", t: 3, a: [0, 1, 2], o: ["ការបញ្ចូល និងអាហារូបត្ថម្ភ (Input and nutrition)", "ពិការភាព (Disability)", "សម្ពាធឈាម (Blood pressure)", "ស្ថានភាពគ្រួសារ (Family situation)"] },
            { c: "មេរៀនទី ៨: Shift Assessment", q: "១២. ជ្រើសយក ២ ដែលត្រឹមត្រូវបំផុត។ ការវាយតម្លៃតាមវេន (Shift assessment) គឺជា ការវាយតម្លៃគិលានុបដ្ឋាកដែលបានបញ្ចប់នៅ (nursing assessment completed at):", t: 2, a: [0, 1], o: ["ការចាប់ផ្តើមនៃវេននីមួយៗ (Commencement of each shift)", "ស្ថានភាពអ្នកជំងឺប្រែប្រួលក្នុងវេន (Patient condition change during your shift)", "ពេលចូលសម្រាកពេទ្យ (The time of admission)", "ពេលអ្នកជំងឺចេញពីមន្ទីរពេទ្យ (The time of patient discharged from hospital)"] },
            { c: "មេរៀនទី ៨: Shift Assessment", discussion: "សំណួរពិភាក្សា (Discussion Question)៖ តើគ្រូពេទ្យគួរអនុវត្តការវាយតម្លៃតាមវេន (Shift Assessment) នៅពេលណាខ្លះ?" }
        ];

        // Audio Context for feedback
        let audioCtx = null;
        function playTone(freq, type, duration) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }
        const playCorrect = () => playTone(880, 'sine', 0.2);
        const playWrong = () => playTone(220, 'square', 0.2);

        let totalQuestions = 0;

        function initMCQs() {
            const container = document.getElementById('quiz-container');
            let currentChapter = "";

            mcqs.forEach((m, idx) => {
                // Insert Chapter Header
                if (m.c !== currentChapter) {
                    currentChapter = m.c;
                    const chapterHeader = document.createElement('div');
                    chapterHeader.className = "chapter-header text-white px-6 py-4 rounded-xl shadow-md mt-10 mb-6";
                    chapterHeader.innerHTML = `<h2 class="text-2xl font-bold">${currentChapter}</h2>`;
                    container.appendChild(chapterHeader);
                }

                // Handle Discussion Questions differently
                if (m.discussion) {
                    const discDiv = document.createElement('div');
                    discDiv.className = "bg-amber-50 border-l-4 border-amber-500 p-5 rounded-r-lg shadow-sm mt-8";
                    discDiv.innerHTML = `<h3 class="text-lg font-bold text-amber-800 mb-1">✍️ ${m.discussion}</h3><p class="text-sm text-amber-600">សូមត្រៀមចម្លើយសម្រាប់ពិភាក្សានៅក្នុងថ្នាក់។ (Please prepare your answer for class discussion.)</p>`;
                    container.appendChild(discDiv);
                    return; // Skip standard MCQ rendering
                }

                totalQuestions++;
                
                const qDiv = document.createElement('div');
                qDiv.className = 'mcq-wrapper p-6 border rounded-xl bg-white shadow-sm transition-all duration-300';
                qDiv.id = `wrapper-q${idx}`;
                
                // Input Type (Radio for 1 answer, Checkbox for multiple)
                const isMulti = m.t > 1;
                const inputType = isMulti ? 'checkbox' : 'radio';
                const helperText = isMulti ? `<span class="text-sm text-blue-600 font-bold bg-blue-100 px-3 py-1 rounded-full ml-2">(ជ្រើសរើស ${m.t} / Select ${m.t})</span>` : '';

                qDiv.innerHTML = `
                    <p class="font-bold text-lg text-gray-800 mb-4 leading-relaxed">${m.q} ${helperText}</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 options-grid" id="grid-q${idx}">
                        ${m.o.map((opt, oIdx) => `
                            <label class="flex items-start p-4 border rounded-xl hover:bg-slate-50 cursor-pointer transition relative group overflow-hidden bg-white shadow-sm">
                                <input type="${inputType}" name="q${idx}" value="${oIdx}" class="mt-1 mr-3 w-5 h-5 text-blue-600 hidden" onchange="checkAnswer(${idx})">
                                <div class="w-5 h-5 mt-0.5 mr-3 border-2 border-gray-300 rounded${isMulti ? '' : '-full'} check-indicator flex-shrink-0"></div>
                                <span class="text-gray-700 leading-relaxed">${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                `;
                container.appendChild(qDiv);
            });
            
            document.getElementById('total-qs').textContent = totalQuestions;
        }

        // Logic to check answer instantly when selected
        function checkAnswer(qIdx) {
            const m = mcqs[qIdx];
            const grid = document.getElementById(`grid-q${qIdx}`);
            const wrapper = document.getElementById(`wrapper-q${qIdx}`);
            const labels = grid.querySelectorAll('label');
            const checkedBoxes = grid.querySelectorAll(`input[name="q${qIdx}"]:checked`);
            
            // Wait until user selects the required number of options
            if (checkedBoxes.length === m.t) {
                grid.classList.add('disabled-labels');
                let isPerfect = true;
                
                // Evaluate selected boxes
                checkedBoxes.forEach(cb => {
                    const val = parseInt(cb.value);
                    if (m.a.includes(val)) {
                        labels[val].classList.add('option-correct');
                    } else {
                        labels[val].classList.add('option-incorrect');
                        isPerfect = false;
                    }
                });
                
                // Reveal the correct answers that were missed
                m.a.forEach(correctVal => {
                    labels[correctVal].classList.add('option-correct');
                });

                if (isPerfect) {
                    playCorrect();
                    wrapper.classList.add('border-green-300', 'bg-green-50/30');
                } else {
                    playWrong();
                    wrapper.classList.add('border-red-300', 'bg-red-50/30');
                }
            } else if (checkedBoxes.length > m.t) {
                // Prevent checking more than required by unchecking the last clicked
                event.target.checked = false;
            }
        }

        function gradeQuiz() {
            let totalScore = 0;
            
            mcqs.forEach((m, idx) => {
                if(m.discussion) return;
                
                const checkedBoxes = document.querySelectorAll(`input[name="q${idx}"]:checked`);
                let isPerfect = false;

                if (checkedBoxes.length === m.t) {
                    isPerfect = true;
                    checkedBoxes.forEach(cb => {
                        if (!m.a.includes(parseInt(cb.value))) {
                            isPerfect = false;
                        }
                    });
                }
                
                if (isPerfect) totalScore++;
                
                // Auto-evaluate any unanswered questions
                if (checkedBoxes.length < m.t && checkedBoxes.length > 0) {
                     // Force trigger check on incomplete answers
                     checkAnswer(idx); 
                }
            });

            document.getElementById('score').textContent = totalScore;
            document.getElementById('result').style.display = 'block';
            document.getElementById('submit-btn-container').style.display = 'none';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        window.onload = initMCQs;
    </script>
